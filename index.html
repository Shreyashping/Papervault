<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PaperVault — Exam Papers & Quiz</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<h1>PaperVault Quiz Generator</h1>

<div>
  <label>Category</label>
  <input id="category" placeholder="JEE / NEET / CBSE"/>
</div>

<div>
  <label>Subject</label>
  <input id="subject" placeholder="Physics / Chemistry / Maths"/>
</div>

<div>
  <label>Number of Questions</label>
  <input id="count" type="number" value="5"/>
</div>

<button onclick="startQuiz()">Generate Quiz</button>

<pre id="output"></pre>

<script src="app.js"></script>
</body>
</html>
